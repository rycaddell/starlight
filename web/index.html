<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oxbow Journal</title>
  <meta name="description" content="A spiritual attention app for iOS.">
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400,400i&display=swap">
  <style>
    /* Design tokens from Oxbow design system */
    :root {
      --color-body:        #273047;
      --color-body-light:  #505970;
      --color-primary:     #0866E2;
      --color-accent:      #F3A941;
      --color-white:       #FFFFFF;
      --color-card:        #FFFFFF;

      --radius-card:       30px;  /* borderRadius.sheet */
      --radius-button:     12px;  /* borderRadius.button */
      --radius-icon:       22px;

      --font:              'Satoshi', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-color: #1a1f3c;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"),
        radial-gradient(ellipse at 20% 20%, rgba(92, 30, 56, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(26, 46, 92, 0.55) 0%, transparent 55%),
        linear-gradient(135deg, rgba(45, 18, 40, 0.72) 0%, rgba(26, 31, 60, 0.65) 50%, rgba(15, 32, 68, 0.72) 100%),
        url('/bg.jpg');
      background-size: 200px 200px, 100% 100%, 100% 100%, 100% 100%, cover;
      background-position: center, center, center, center, center;
    }

    .wrapper {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Top card (frosted dark) ── */
    .card-top {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-card);
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .app-icon {
      width: 96px;
      height: 96px;
      border-radius: var(--radius-icon);
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    /* typography.heading.xl — 36px 700 */
    .card-top h1 {
      font-size: 36px;
      font-weight: 700;
      color: var(--color-white);
      letter-spacing: 0;
      line-height: 1;
    }

    /* typography.special.journalOptionSubtitle — 15px 400 italic */
    .card-top p {
      font-size: 15px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.15px;
      line-height: 1.4;
    }

    /* ── Bottom card (white) ── */
    .card-bottom {
      background: var(--color-card);
      border-radius: var(--radius-card);
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* Primary button style — colors.text.primary bg, white text */
    .app-store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--color-primary);
      color: var(--color-white);
      text-decoration: none;
      border-radius: var(--radius-button);
      padding: 13px 24px;
      transition: opacity 0.15s ease;
      width: 100%;
      justify-content: center;
    }

    .app-store-btn:hover { opacity: 0.85; }

    .app-store-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .app-store-btn .btn-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    /* typography.heading.xs — 13px 500 uppercase */
    .app-store-btn .btn-text span:first-child {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.85;
    }

    /* typography.heading.s — 15px 700 */
    .app-store-btn .btn-text span:last-child {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* typography.body.s — 13px 500 */
    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-primary);
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    .footer-links a:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card-top">
      <img src="/icon.png" alt="Oxbow Journal app icon" class="app-icon">
      <h1>Oxbow Journal</h1>
      <p>a spiritual attention app</p>
    </div>

    <div class="card-bottom">
      <!-- App Store button — uncomment and add href when App Store link is ready
      <a href="APP_STORE_URL" class="app-store-btn" aria-label="Download on the App Store">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        <div class="btn-text">
          <span>Download on the</span>
          <span>App Store</span>
        </div>
      </a>
      -->

      <div class="footer-links">
        <a href="mailto:hello@oxbowjournal.com">Contact Us</a>
        <a href="https://app.termly.io/policy-viewer/policy.html?policyUUID=bf1cff31-3390-4b3d-b6d2-5bfc2642343d" target="_blank" rel="noopener">Privacy Policy</a>
      </div>
    </div>
  </div>
</body>
</html>
